name: Debug Flutter APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - run: flutter doctor -v

      - run: flutter clean

      - run: flutter pub get

      - name: Show files
        run: ls -R

      - name: Build APK (verbose)
        run: flutter build apk --debug -v
